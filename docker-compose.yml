# shairport-sync container for AirBeam integration and E2E tests.
#
# Usage:
#   docker compose up -d
#   ctest --output-on-failure   # integration tests auto-skip if container is unreachable
#
# Requirements:
#   - Docker on Linux or WSL2 (network_mode: host is required for RTP UDP port negotiation)
#   - The container exposes RTSP on TCP :5000 and accepts any UDP port for RTP/control/timing
#
# On Windows Docker Desktop without WSL2 backend, replace network_mode with explicit
# port mappings and configure shairport-sync with a fixed RTP port range.

services:
  # Linux / WSL2 (preferred — required for RTP UDP port negotiation):
  # network_mode: host exposes all ports directly. Uncomment below and
  # comment out the shairport-sync block to switch back.
  #shairport-sync-host:
  #  image: mikebrady/shairport-sync:latest
  #  network_mode: host
  #  command: >
  #    -v
  #    --name=AirBeam-Test
  #    --port=5000
  #    -o dummy
  #  restart: unless-stopped

  # Windows Docker Desktop: explicit port mappings (RTSP/TCP only; RTP/UDP
  # ports are negotiated dynamically so full E2E audio verification
  # requires WSL2 backend with host networking).
  shairport-sync:
    image: mikebrady/shairport-sync:latest
    ports:
      - "5000:5000"
    command: >
      -v
      --name=AirBeam-Test
      --port=5000
      -o dummy
    restart: unless-stopped
